<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
</head>
<body>
<h1 align="center">Student Registration Form</h1>

<form>
    <fieldset>
        <legend>Personal Details</legend>

        <label>First Name:</label><br>
        <input type="text" name="fname" placeholder="Enter First Name" required>
        <br><br>

        <label>Last Name:</label><br>
        <input type="text" name="lname" placeholder="Enter Last Name">
        <br><br>

        <label>Email:</label><br>
        <input type="email" name="email" placeholder="Enter Email">
        <br><br>

        <label>Password:</label><br>
        <input type="password" name="password">
        <br><br>

        <label>Phone Number:</label><br>
        <input type="tel" name="phone" placeholder="9876543210">
        <br><br>

        <label>Age:</label><br>
        <input type="number" name="age" min="18" max="60">
        <br><br>

        <label>Date of Birth:</label><br>
        <input type="date" name="dob">
        <br><br>

        <label>Birth Time:</label><br>
        <input type="time" name="time">
        <br><br>

        <label>Birth Month:</label><br>
        <input type="month" name="month">
        <br><br>

        <label>Birth Week:</label><br>
        <input type="week" name="week">
        <br><br>

    </fieldset>

    <br>

    <fieldset>
        <legend>Gender</legend>

        <input type="radio" name="gender" value="Male"> Male

        <input type="radio" name="gender" value="Female"> Female

        <input type="radio" name="gender" value="Other"> Other

    </fieldset>

    <br>

    <fieldset>
        <legend>Languages Known</legend>

        <input type="checkbox" name="lang" value="English"> English

        <input type="checkbox" name="lang" value="Kannada"> Kannada

        <input type="checkbox" name="lang" value="Hindi"> Hindi

        <input type="checkbox" name="lang" value="Telugu"> Telugu

    </fieldset>

    <br>

    <fieldset>
        <legend>Educational Details</legend>

        <label>Select Course:</label><br>

        <select name="course">
            <option>Select</option>
            <option>BCA</option>
            <option>BBA</option>
            <option>BTech</option>
            <option>MBA</option>
            <option>MTech</option>
        </select>

        <br><br>

        <label>Select Semester:</label><br>

        <select>
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
            <option>5</option>
            <option>6</option>
            <option>7</option>
            <option>8</option>
        </select>

    </fieldset>

    <br>

    <fieldset>

        <legend>Address</legend>

        <textarea rows="5" cols="40"
        placeholder="Enter Address"></textarea>

    </fieldset>

    <br>

    <fieldset>

        <legend>Other Details</legend>

        <label>Favorite Color:</label><br>
        <input type="color">
        <br><br>

        <label>Upload Photo:</label><br>
        <input type="file">
        <br><br>
        <label>Search City:</label><br>
        <input type="search">
        <br><br>
        <label>Skill Level:</label><br>
        Beginner
        <input type="range" min="0" max="100">
        Expert
        <br><br>

    </fieldset>

    <br>

    <fieldset>

        <legend>Declaration</legend>

        <input type="checkbox" required>

        I declare that all the information provided is correct.

    </fieldset>

    <br>

    <input type="submit" value="Register">

    <input type="reset" value="Clear">

</form>

</body>
</html>
